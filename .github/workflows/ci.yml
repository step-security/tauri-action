name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - dev
      - 'renovate/**'
      - '!renovate/lock-file-maintenance'

jobs:
  CI:
    continue-on-error: true
    permissions:
      contents: read

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.x.x

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm

      - name: install dependencies
        run: pnpm install

      - name: check formatting
        run: pnpm format:check

      - name: run linter
        run: pnpm lint

      - name: build
        run: pnpm build

      #- name: run tests
      #  run: pnpm test
