name: CI

on:
  workflow_dispatch:
  pull_request:
  push:

jobs:
  CI:
    continue-on-error: true
    permissions:
      contents: read

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: install dependencies
        run: npm ci

      - name: check formatting
        run: npm run format:check

      - name: run linter
        run: npm run lint

      - name: build
        run: npm run build

      #- name: run tests
      #  run: npm test
