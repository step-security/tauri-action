name: covector status

on: [pull_request]

jobs:
  covector:
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: covector status
        uses: jbolda/covector/packages/action@covector-v0
        with:
          command: 'status'
          token: ${{ secrets.GITHUB_TOKEN }}
          comment: true
